<!DOCTYPE html>
<style>
    * {
        box-sizing: border-box;
    }
    h1 {
        text-align: center;
        font-family: cursive;
    }
    body {
        background-color: rgb(97, 97, 218);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #calculadora table{
        border-collapse: collapse;
    }
    #calculadora table{
        height: 300px;
    }
    #calculadora button,
    #calculadora input{
        width: 100%;
        height: 100%;
        font-size: 1rem;
        padding: 10px;
    }
    #calculadora input{
        padding: 16px;
        color: white;
        border: none;
        background-color: rgb(0, 0, 0, .5);
    }
    #calculadora input:focus{
        outline: none;
    }
    #calculadora button{
        background-color: rgb(0, 0, 0, .4);
        border:none;
        color: white;
        font-weight: bold;
        cursor: pointer;

    }
    #calculadora button:hover{
        background-color: rgb(26, 34, 56);
    }
    #calculadora button:focus{
        outline: none;
    }
    #calculadora .operacion{
        background-color: crimson;
    }
    #calculadora button.operacion#igual,
    #calculadora button.operacion#clear,
    #calculadora button.operacion#suma{
        background-color: black;
    }
</style>
<head>
    <title>CALCULADORA</title>
</head>
<body>
    <form id="calculadora">
        <table>
            <tr>
                <td colspan="4"><input type="text" reoadonly id="resultado"></td>
            </tr>
            <tr>
                <td><button type="button" id="clear" class="operacion">C</button></td>
                <td><button type="button" id="dividir" class="operacion">/</button></td>
                <td><button type="button" id="multiplicar" class="operacion">X</button></td>
                <td rowspan="2"><button type="button" id="restar" class="operacion">-</button></td>
            </tr>
            <tr>
                <td><button type="button">1</button></td>
                <td><button type="button">2</button></td>
                <td><button type="button">3</button></td>
            </tr>
            <tr>
                <td><button type="button">4</button></td>
                <td><button type="button">5</button></td>
                <td><button type="button">6</button></td>
                <td rowspan="2"><button type="button" id="suma" class="operacion">+</button></td>
            </tr>
            <tr>
                <td><button type="button">7</button></td>
                <td><button type="button">8</button></td>
                <td><button type="button">9</button></td>
            </tr>
            <tr>
                <td colspan="2"><button type="button">0</button></td>
                <td><button type="button">.</button></td>
                <td colspan="2"><button type="button" id="igual" class="operacion">=</button></td>
            </tr>
        </table>
    </form>
</body>
</html>
